<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121828">
    <title>Asma al Husna - Recherche des Noms d'Allah</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121828;
            --container-bg: #ffffff;
            --primary-text: #2c3e50;
            --secondary-text: #7f8c8d;
            --accent-color: #d4af37;
            --accent-hover: #e5c160;
            --arabic-font: 'Amiri', 'Traditional Arabic', serif;
            --latin-font: 'Poppins', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--latin-font);
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 620px;
            text-align: center;
        }

        h1 {
            font-weight: 600;
            color: var(--primary-text);
            margin: 0 0 8px;
            font-size: 1.9em;
        }

        .subtitle {
            color: var(--secondary-text);
            font-size: 0.95em;
            font-weight: 300;
            margin: 0 0 30px;
        }

        .search-section {
            position: relative;
            margin-bottom: 10px;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 17px;
            border: 2px solid #ced4da;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
            font-family: var(--latin-font);
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            background-color: #fff;
        }

        .suggestions {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            list-style: none;
            margin: 0;
            padding: 6px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            text-align: left;
        }

        .suggestions li {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .suggestions li:hover,
        .suggestions li.active {
            background-color: #faf3e0;
        }

        .suggestions .s-num {
            color: var(--accent-color);
            font-weight: 600;
            min-width: 28px;
        }

        .suggestions .s-nom {
            color: var(--primary-text);
            font-weight: 600;
        }

        .suggestions .s-attr {
            color: var(--secondary-text);
            font-size: 0.85em;
            font-weight: 300;
        }

        .hint {
            color: var(--secondary-text);
            font-size: 0.8em;
            font-weight: 300;
            margin: 0 0 25px;
        }

        .result-section {
            background: #fff;
            padding: 30px 25px;
            border-radius: 15px;
            border: 1px solid #e9ecef;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-number {
            font-size: 1.1em;
            color: var(--secondary-text);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .result-name-ar {
            font-family: var(--arabic-font);
            font-weight: 700;
            font-size: 4.2em;
            color: var(--primary-text);
            margin: 0;
            line-height: 1.6;
        }

        .result-name {
            font-size: 1.6em;
            color: var(--accent-color);
            font-weight: 600;
            margin-top: 5px;
            margin-bottom: 8px;
        }

        .result-attribute {
            font-size: 1.15em;
            color: var(--primary-text);
            font-weight: 400;
        }

        .result-ref {
            display: inline-block;
            margin-top: 12px;
            font-size: 0.8em;
            font-weight: 600;
            color: var(--accent-color);
            background-color: #faf3e0;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .result-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            background-color: #fff;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 9px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: var(--latin-font);
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        .action-feedback {
            font-size: 0.8em;
            color: var(--secondary-text);
            font-weight: 300;
            margin-top: 8px;
            min-height: 1.2em;
        }

        .result-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            gap: 10px;
        }

        .nav-arrow {
            background-color: #f1f3f4;
            border: none;
            color: var(--primary-text);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-family: var(--latin-font);
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-arrow:hover:not(:disabled) {
            background-color: var(--accent-color);
            color: #fff;
        }

        .nav-arrow:disabled {
            opacity: 0.35;
            cursor: default;
        }

        .result-counter {
            color: var(--secondary-text);
            font-size: 0.85em;
            font-weight: 300;
        }

        .navigation {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #f1f3f4;
            color: var(--secondary-text);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9em;
        }

        .nav-btn:hover {
            background-color: #e9ecef;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Asma al Husna</h1>
        <p class="subtitle">Recherchez l'un des 99 Noms d'Allah par son numéro ou son nom</p>

        <div class="search-section">
            <input type="text" id="searchInput" class="search-input"
                   placeholder="Ex. : 2, Rahman, Miséricordieux…"
                   autocomplete="off" aria-label="Rechercher un nom d'Allah">
            <ul id="suggestions" class="suggestions"></ul>
        </div>
        <p class="hint">Tapez pour rechercher, ou parcourez avec les flèches ci-dessous</p>

        <div id="resultSection" class="result-section">
            <div id="resultNumber" class="result-number"></div>
            <div id="resultNameAr" class="result-name-ar" dir="rtl"></div>
            <div id="resultName" class="result-name"></div>
            <div id="resultAttribute" class="result-attribute"></div>
            <span id="resultRef" class="result-ref"></span>
            <div class="result-actions">
                <button class="action-btn" onclick="ecouter()">&#9658; Écouter</button>
                <button class="action-btn" onclick="partager()">Partager</button>
            </div>
            <div id="actionFeedback" class="action-feedback"></div>
            <div class="result-nav">
                <button id="btnPrev" class="nav-arrow" onclick="naviguer(-1)">&larr; Précédent</button>
                <span id="resultCounter" class="result-counter"></span>
                <button id="btnNext" class="nav-arrow" onclick="naviguer(1)">Suivant &rarr;</button>
            </div>
        </div>

        <div class="navigation">
            <a href="nombres_allah.html" class="nav-btn">Liste complète</a>
            <a href="quiz.html" class="nav-btn">Mode mémorisation</a>
        </div>
    </div>

    <script src="noms.js"></script>
    <script>
        let nombreActuel = 1;

        const searchInput = document.getElementById('searchInput');
        const suggestionsList = document.getElementById('suggestions');

        function getNom(n) {
            return NOMS_ALLAH[n - 1];
        }

        // Normalise le texte pour une recherche tolérante (accents, apostrophes, tirets)
        function normaliser(texte) {
            return texte.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/['’\-\s]/g, '');
        }

        function afficherNom(nombre) {
            nombreActuel = nombre;
            const item = getNom(nombre);

            document.getElementById('resultNumber').textContent = 'N° ' + nombre;
            document.getElementById('resultNameAr').textContent = item.arabe;
            document.getElementById('resultName').textContent = item.nom;
            document.getElementById('resultAttribute').textContent = item.attribut;

            const refEl = document.getElementById('resultRef');
            refEl.textContent = item.ref || '';
            refEl.style.display = item.ref ? 'inline-block' : 'none';

            document.getElementById('resultCounter').textContent = nombre + ' / 99';
            document.getElementById('btnPrev').disabled = (nombre === 1);
            document.getElementById('btnNext').disabled = (nombre === 99);
            document.getElementById('actionFeedback').textContent = '';

            // Mettre à jour l'URL pour permettre le partage direct
            try {
                history.replaceState(null, '', '?n=' + nombre);
            } catch (e) {
                // Indisponible lors d'une ouverture directe du fichier (file://)
            }
        }

        function naviguer(direction) {
            const nouveau = nombreActuel + direction;
            if (nouveau >= 1 && nouveau <= 99) {
                afficherNom(nouveau);
            }
        }

        function chercherCorrespondances(requete) {
            const requeteNorm = normaliser(requete);
            if (!requeteNorm) return [];

            const numero = parseInt(requete, 10);
            if (!isNaN(numero) && String(numero) === requete.trim()) {
                return (numero >= 1 && numero <= 99) ? [numero] : [];
            }

            return NOMS_ALLAH
                .filter(item => normaliser(item.nom).includes(requeteNorm)
                             || normaliser(item.attribut).includes(requeteNorm))
                .map(item => item.n);
        }

        function afficherSuggestions(correspondances) {
            suggestionsList.innerHTML = '';
            if (correspondances.length === 0) {
                suggestionsList.style.display = 'none';
                return;
            }
            correspondances.slice(0, 8).forEach(n => {
                const item = getNom(n);
                const li = document.createElement('li');
                li.innerHTML = '<span class="s-num">' + n + '</span>' +
                               '<span class="s-nom">' + item.nom + '</span>' +
                               '<span class="s-attr">' + item.attribut + '</span>';
                li.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    selectionner(n);
                });
                suggestionsList.appendChild(li);
            });
            suggestionsList.style.display = 'block';
        }

        function selectionner(nombre) {
            afficherNom(nombre);
            searchInput.value = '';
            suggestionsList.style.display = 'none';
        }

        function ecouter() {
            const feedback = document.getElementById('actionFeedback');
            if (!('speechSynthesis' in window)) {
                feedback.textContent = "La lecture audio n'est pas disponible sur ce navigateur.";
                return;
            }
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(getNom(nombreActuel).arabe);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.8;
            const voixArabe = speechSynthesis.getVoices().find(v => v.lang.startsWith('ar'));
            if (voixArabe) {
                utterance.voice = voixArabe;
            } else {
                feedback.textContent = "Aucune voix arabe installée : la prononciation peut être approximative.";
            }
            speechSynthesis.speak(utterance);
        }

        function partager() {
            const item = getNom(nombreActuel);
            const feedback = document.getElementById('actionFeedback');
            const url = window.location.href;
            const texte = item.nom + (item.attribut ? ' — ' + item.attribut : '') + ' (' + item.arabe + ')';

            if (navigator.share) {
                navigator.share({ title: 'Asma al Husna', text: texte, url: url }).catch(function() {});
            } else if (navigator.clipboard) {
                navigator.clipboard.writeText(texte + '\n' + url).then(function() {
                    feedback.textContent = 'Lien copié dans le presse-papiers';
                });
            } else {
                feedback.textContent = url;
            }
        }

        searchInput.addEventListener('input', function() {
            afficherSuggestions(chercherCorrespondances(this.value));
        });

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const correspondances = chercherCorrespondances(this.value);
                if (correspondances.length > 0) {
                    selectionner(correspondances[0]);
                }
            } else if (e.key === 'Escape') {
                suggestionsList.style.display = 'none';
            }
        });

        searchInput.addEventListener('blur', function() {
            suggestionsList.style.display = 'none';
        });

        document.addEventListener('keydown', function(e) {
            if (document.activeElement === searchInput) return;
            if (e.key === 'ArrowLeft') naviguer(-1);
            if (e.key === 'ArrowRight') naviguer(1);
        });

        // Au chargement : afficher le nom passé en paramètre d'URL (?n=X) ou le premier
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const n = parseInt(params.get('n'), 10);
            afficherNom(!isNaN(n) && n >= 1 && n <= 99 ? n : 1);
            searchInput.focus();
        });

        // PWA : enregistrement du service worker (nécessite un serveur http/https)
        if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
            navigator.serviceWorker.register('sw.js').catch(function() {});
        }
    </script>
</body>
</html>
