<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121828">
    <script>
        (function () {
            try {
                var t = localStorage.getItem('asma_theme') ||
                    ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>
    <title>Asma al Husna - Les 99 Noms d'Allah</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121828;
            --container-bg: #ffffff;
            --primary-text: #2c3e50;
            --secondary-text: #7f8c8d;
            --accent-color: #d4af37;
            --accent-hover: #e5c160;
            --arabic-font: 'Amiri', 'Traditional Arabic', serif;
            --latin-font: 'Poppins', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--latin-font);
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            color: var(--primary-text);
            margin: 0 0 8px;
            font-size: 1.9em;
        }

        .subtitle {
            text-align: center;
            color: var(--secondary-text);
            font-size: 0.95em;
            font-weight: 300;
            margin: 0 0 25px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .filter-input {
            flex: 1;
            min-width: 220px;
            max-width: 450px;
            padding: 12px 18px;
            font-size: 16px;
            border: 2px solid #ced4da;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
            font-family: var(--latin-font);
        }

        .filter-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            background-color: #fff;
        }

        .nav-btn {
            display: inline-block;
            padding: 12px 20px;
            background-color: #f1f3f4;
            color: var(--secondary-text);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9em;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background-color: #e9ecef;
            transform: translateY(-2px);
        }

        .nombres-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 15px;
        }

        .nombre-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 12px;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            background-color: #fafafa;
            transition: all 0.25s ease;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }

        .nombre-item:hover {
            border-color: var(--accent-color);
            background-color: #fffdf5;
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        }

        .numero {
            font-weight: 600;
            font-size: 0.8em;
            color: var(--accent-color);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .nom-arabe {
            font-family: var(--arabic-font);
            font-weight: 700;
            font-size: 1.9em;
            color: var(--primary-text);
            line-height: 1.5;
        }

        .nom-translit {
            font-weight: 600;
            color: var(--primary-text);
            margin-top: 2px;
        }

        .attribut {
            font-size: 0.85em;
            font-weight: 300;
            color: var(--secondary-text);
            margin-top: 2px;
        }

        .aucun-resultat {
            text-align: center;
            color: var(--secondary-text);
            padding: 30px;
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .lang-switch {
            display: flex;
            gap: 6px;
        }

        .lang-btn,
        .theme-toggle {
            padding: 5px 12px;
            border: 1px solid #ced4da;
            background-color: #f8f9fa;
            color: var(--secondary-text);
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--latin-font);
            font-size: 0.8em;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .lang-btn:hover,
        .theme-toggle:hover { border-color: var(--accent-color); }

        .lang-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
        }

        body, .container, .filter-input, .nombre-item, .nav-btn {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #0d1117;
            --container-bg: #161b2c;
            --primary-text: #ebc777;
            --secondary-text: #c9a24b;
            --accent-color: #e5c160;
            --accent-hover: #f0d27a;
        }

        [data-theme="dark"] .filter-input {
            background-color: #1d2740;
            border-color: #313c5c;
            color: var(--primary-text);
        }
        [data-theme="dark"] .filter-input::placeholder { color: #8a7b4f; }
        [data-theme="dark"] .filter-input:focus { background-color: #232e4a; }

        [data-theme="dark"] .nombre-item {
            background-color: #1c2336;
            border-color: #2c3654;
        }
        [data-theme="dark"] .nombre-item:hover {
            border-color: var(--accent-color);
            background-color: #232e4a;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
        }

        [data-theme="dark"] .nav-btn {
            background-color: #222b45;
            color: var(--secondary-text);
        }
        [data-theme="dark"] .nav-btn:hover { background-color: #2c3654; }

        [data-theme="dark"] .lang-btn,
        [data-theme="dark"] .theme-toggle {
            background-color: #222b45;
            border-color: #313c5c;
            color: var(--secondary-text);
        }
        [data-theme="dark"] .lang-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #161b2c;
        }

        @media (max-width: 600px) {
            body { padding: 0; }

            .container {
                width: 100%;
                max-width: none;
                min-height: 100vh;
                margin: 0;
                padding: 28px 16px;
                border-radius: 0;
                box-shadow: none;
            }

            h1 { font-size: 1.5em; }

            .toolbar {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 24px;
            }

            .filter-input {
                width: 100%;
                max-width: none;
                min-width: 0;
            }

            .nav-btn { width: 100%; text-align: center; }

            .nombres-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }

            .nombre-item { padding: 14px 8px; }
            .nom-arabe { font-size: 1.6em; }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 50;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--container-bg);
            border-radius: 18px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px 26px 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            text-align: center;
            position: relative;
            animation: popIn 0.25s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 14px;
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            background: #f1f3f4;
            color: var(--secondary-text);
            font-size: 1.3em;
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .modal-close:hover { background: var(--accent-color); color: #fff; }

        .modal-numero {
            color: var(--accent-color);
            font-weight: 600;
            font-size: 0.85em;
            letter-spacing: 1px;
        }
        .modal-arabe {
            font-family: var(--arabic-font);
            font-weight: 700;
            font-size: 3.4em;
            color: var(--primary-text);
            line-height: 1.5;
            margin: 4px 0;
        }
        .modal-nom {
            font-size: 1.4em;
            font-weight: 600;
            color: var(--accent-color);
        }
        .modal-attribut {
            font-size: 1.05em;
            color: var(--primary-text);
            margin-top: 4px;
        }
        .modal-ref {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.78em;
            font-weight: 600;
            color: var(--accent-color);
            background-color: #faf3e0;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .modal-section {
            text-align: left;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid #e9ecef;
        }
        .modal-section h3 {
            margin: 0 0 6px;
            font-size: 0.78em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
        }
        .modal-section p {
            margin: 0;
            font-size: 0.95em;
            line-height: 1.6;
            color: var(--primary-text);
            font-weight: 300;
        }
        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 22px;
        }
        .modal-btn {
            padding: 9px 18px;
            border-radius: 10px;
            border: 2px solid var(--accent-color);
            background: #fff;
            color: var(--accent-color);
            font-family: var(--latin-font);
            font-weight: 600;
            font-size: 0.88em;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .modal-btn:hover { background: var(--accent-color); color: #fff; }
        .modal-btn.solid { background: var(--accent-color); color: #fff; }
        .modal-btn.solid:hover { background: var(--accent-hover); }

        [data-theme="dark"] .modal { box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6); }
        [data-theme="dark"] .modal-close { background: #222b45; }
        [data-theme="dark"] .modal-close:hover { background: var(--accent-color); color: #161b2c; }
        [data-theme="dark"] .modal-ref { background-color: rgba(229, 193, 96, 0.14); }
        [data-theme="dark"] .modal-section { border-top-color: #2c3654; }
        [data-theme="dark"] .modal-btn { background: #1c2336; }
        [data-theme="dark"] .modal-btn:hover { color: #161b2c; }
        [data-theme="dark"] .modal-btn.solid { color: #161b2c; }

        @media (max-width: 600px) {
            .modal { padding: 26px 18px 20px; max-height: 92vh; }
            .modal-arabe { font-size: 2.7em; }
            .modal-btn { flex: 1; min-width: 130px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <button id="themeToggle" class="theme-toggle" type="button"></button>
            <div id="langSwitch"></div>
        </div>
        <h1 id="appTitle">Asma al Husna</h1>
        <p class="subtitle" id="subtitle">Les 99 Noms d'Allah — cliquez sur un nom pour le voir en détail</p>

        <div class="toolbar">
            <input type="text" id="filterInput" class="filter-input"
                   placeholder="Filtrer par numéro, nom ou attribut…"
                   autocomplete="off" aria-label="Filtrer les noms">
            <a href="index.html" id="navSearch" class="nav-btn">Recherche détaillée</a>
            <a href="quiz.html" id="navQuiz" class="nav-btn">Mode mémorisation</a>
        </div>

        <div class="nombres-grid" id="nombresContainer"></div>
        <p id="aucunResultat" class="aucun-resultat">Aucun nom ne correspond à votre recherche.</p>
    </div>

    <div id="detailModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalNom">
        <div class="modal">
            <button id="modalClose" class="modal-close" type="button" aria-label="Fermer">&times;</button>
            <div id="modalNumero" class="modal-numero"></div>
            <div id="modalArabe" class="modal-arabe" dir="rtl"></div>
            <div id="modalNom" class="modal-nom"></div>
            <div id="modalAttribut" class="modal-attribut"></div>
            <span id="modalRef" class="modal-ref"></span>
            <div class="modal-section" id="modalDetailSection">
                <h3 id="modalDetailLabel"></h3>
                <p id="modalDetail"></p>
            </div>
            <div class="modal-section" id="modalVertuSection">
                <h3 id="modalVertuLabel"></h3>
                <p id="modalVertu"></p>
            </div>
            <div class="modal-actions">
                <button id="modalListen" class="modal-btn" type="button"></button>
                <a id="modalSearch" class="modal-btn solid" href="#"></a>
            </div>
        </div>
    </div>

    <script src="noms.js"></script>
    <script src="details.js"></script>
    <script src="i18n.js"></script>
    <script>
        let nomAffiche = null;

        // Normalise le texte pour un filtre tolérant (accents, apostrophes, tirets)
        function normaliser(texte) {
            return texte.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/['’\-\s]/g, '');
        }

        function afficherNombres() {
            const container = document.getElementById('nombresContainer');
            container.innerHTML = '';

            NOMS_ALLAH.forEach(item => {
                const carte = document.createElement('a');
                carte.className = 'nombre-item';
                carte.href = 'index.html?n=' + item.n;
                carte.dataset.recherche = normaliser(
                    item.n + ' ' + item.nom + ' ' + item.attribut + ' ' + (item.attribut_tr || '')
                );
                carte.innerHTML =
                    '<div class="numero">' + t('numero') + ' ' + item.n + '</div>' +
                    '<div class="nom-arabe" dir="rtl">' + item.arabe + '</div>' +
                    '<div class="nom-translit">' + item.nom + '</div>' +
                    '<div class="attribut">' + attributLocalise(item) + '</div>';
                carte.addEventListener('click', function(e) {
                    // On laisse le clic avec modificateur ouvrir la page dans un nouvel onglet.
                    if (e.ctrlKey || e.metaKey || e.shiftKey || e.button === 1) return;
                    e.preventDefault();
                    ouvrirModal(item);
                });
                container.appendChild(carte);
            });
        }

        function ouvrirModal(item) {
            nomAffiche = item;
            document.getElementById('modalNumero').textContent = t('numero') + ' ' + item.n;
            document.getElementById('modalArabe').textContent = item.arabe;
            document.getElementById('modalNom').textContent = item.nom;

            const attr = attributLocalise(item);
            const attrEl = document.getElementById('modalAttribut');
            attrEl.textContent = attr;
            attrEl.style.display = attr ? 'block' : 'none';

            const refEl = document.getElementById('modalRef');
            refEl.textContent = item.ref || '';
            refEl.style.display = item.ref ? 'inline-block' : 'none';

            const det = detailLocalise(item);
            document.getElementById('modalDetailLabel').textContent = t('detailLabel');
            document.getElementById('modalDetail').textContent = det;
            document.getElementById('modalDetailSection').style.display = det ? 'block' : 'none';

            const ver = vertuLocalise(item);
            document.getElementById('modalVertuLabel').textContent = t('vertuLabel');
            document.getElementById('modalVertu').textContent = ver;
            document.getElementById('modalVertuSection').style.display = ver ? 'block' : 'none';

            document.getElementById('modalListen').innerHTML = '&#9658; ' + t('listen');
            const searchLink = document.getElementById('modalSearch');
            searchLink.textContent = t('detailedSearch');
            searchLink.href = 'index.html?n=' + item.n;
            document.getElementById('modalClose').setAttribute('aria-label', t('close'));

            document.getElementById('detailModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function fermerModal() {
            document.getElementById('detailModal').classList.remove('open');
            document.body.style.overflow = '';
            if ('speechSynthesis' in window) speechSynthesis.cancel();
        }

        function ecouterModal() {
            if (!nomAffiche || !('speechSynthesis' in window)) return;
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(nomAffiche.arabe);
            u.lang = 'ar-SA';
            u.rate = 0.8;
            const voix = speechSynthesis.getVoices().find(v => v.lang.startsWith('ar'));
            if (voix) u.voice = voix;
            speechSynthesis.speak(u);
        }

        function filtrer() {
            const requete = normaliser(document.getElementById('filterInput').value);
            const cartes = document.querySelectorAll('.nombre-item');
            let visibles = 0;

            cartes.forEach(carte => {
                const correspond = !requete || carte.dataset.recherche.includes(requete);
                carte.style.display = correspond ? '' : 'none';
                if (correspond) visibles++;
            });

            document.getElementById('aucunResultat').style.display = visibles === 0 ? 'block' : 'none';
        }

        function appliquerTraductions() {
            appliquerLangueDocument('docTitleList');
            document.getElementById('appTitle').textContent = t('appTitle');
            document.getElementById('subtitle').textContent = t('listSubtitle');
            const filtre = document.getElementById('filterInput');
            filtre.placeholder = t('filterPlaceholder');
            filtre.setAttribute('aria-label', t('filterAria'));
            document.getElementById('navSearch').textContent = t('detailedSearch');
            document.getElementById('navQuiz').textContent = t('memoMode');
            document.getElementById('aucunResultat').textContent = t('noResult');
            rafraichirThemeToggle();
            afficherNombres();
            filtrer();
            // Si la fenêtre de détail est ouverte, on la retraduit aussi.
            if (nomAffiche && document.getElementById('detailModal').classList.contains('open')) {
                ouvrirModal(nomAffiche);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            initThemeToggle(document.getElementById('themeToggle'));
            initSelecteurLangue(document.getElementById('langSwitch'), appliquerTraductions);
            appliquerTraductions();
            document.getElementById('filterInput').addEventListener('input', filtrer);

            document.getElementById('modalClose').addEventListener('click', fermerModal);
            document.getElementById('modalListen').addEventListener('click', ecouterModal);
            document.getElementById('detailModal').addEventListener('click', function(e) {
                if (e.target === this) fermerModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') fermerModal();
            });
        });

        // PWA : enregistrement du service worker (nécessite un serveur http/https)
        if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
            navigator.serviceWorker.register('sw.js').catch(function() {});
        }
    </script>
</body>
</html>
